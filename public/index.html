<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Terminal</title>
  <link rel="stylesheet" href="/xterm/xterm/css/xterm.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app">
    <div id="toolbar">
      <span class="title">Web Terminal</span>
      <div class="spacer"></div>
      <!-- Card buttons are auto-generated from the CardRegistry -->
    </div>
    <div id="pane-container"></div>
  </div>

  <script src="/xterm/xterm/lib/xterm.js"></script>
  <script src="/xterm/addon-fit/lib/addon-fit.js"></script>
  <script src="/xterm/addon-web-links/lib/addon-web-links.js"></script>
  <script src="/js/workspace-config.js"></script>
  <script src="/js/output-utils.js"></script>
  <script src="/js/pane-geometry.js"></script>
  <script src="/js/gesture-manager.js"></script>
  <script src="/js/card-registry.js"></script>
  <script src="/js/base-card.js"></script>
  <!-- Card types — each file self-registers via CardRegistry.register() -->
  <script src="/js/terminal-pane.js"></script>
  <script src="/js/project-card.js"></script>
  <script src="/js/agent-output-card.js"></script>
  <script src="/js/mission-card.js"></script>
  <script src="/js/markdown-card.js"></script>
  <!-- Core (consumes the registry) -->
  <script src="/js/pane-manager.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
